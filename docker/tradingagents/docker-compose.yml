services:
  # ---- CLI mode (default) ----
  tradingagents:
    image: ghcr.io/viogus/tradingagents:latest
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./results:/data/results
    tty: true
    stdin_open: true

  # ---- Web UI mode (Streamlit) ----
  tradingagents-web:
    image: ghcr.io/viogus/tradingagents:latest
    command: tradingagents-web
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    ports:
      - "8501:8501"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./results:/data/results
    profiles:
      - web

  # ---- Ollama (local LLM, optional) ----
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  # ---- CLI + Ollama (local LLM) ----
  tradingagents-ollama:
    image: ghcr.io/viogus/tradingagents:latest
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./results:/data/results
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
