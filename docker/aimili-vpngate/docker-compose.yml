services:
  aimili-vpngate:
    image: ghcr.io/viogus/aimili-vpngate:latest
    restart: unless-stopped
    ports:
      - "8787:8787"   # web panel
      - "7928:7928"   # SOCKS5/HTTP proxy
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.rp_filter=2
      - net.ipv4.conf.default.rp_filter=2
    volumes:
      - aimili-data:/opt/aimilivpn/vpngate_data
    environment:
      - WEB_PORT=8787
      # - WEB_USERNAME=admin
      # - WEB_PASSWORD=your_password
      # - SECRET_PATH=mysecret
      # - LOCAL_PROXY_USER=proxy_user      # SOCKS5/HTTP 代理认证
      # - LOCAL_PROXY_PASS=proxy_pass      # 设置后代理需用户名密码

volumes:
  aimili-data:
