services:
  oci-helper:
    image: ghcr.io/viogus/oci-helper:latest
    container_name: oci-helper
    restart: unless-stopped
    ports:
      - "8818:8818"
    volumes:
      - oci-helper-data:/app/oci-helper
    environment:
      - OCI_USERNAME=admin
      - OCI_PASSWORD=change-me
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8818"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  websockify:
    image: ghcr.io/viogus/oci-helper-ws:latest
    container_name: oci-helper-ws
    restart: unless-stopped
    ports:
      - "6080:6080"

volumes:
  oci-helper-data:
