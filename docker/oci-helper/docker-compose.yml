services:
  oci-helper:
    image: ghcr.io/viogus/oci-helper:latest
    container_name: oci-helper
    restart: unless-stopped
    ports:
      - "8818:8818"
    volumes:
      - oci-helper-data:/app/oci-helper
    environment:
      - OCI_USERNAME=admin
      - OCI_PASSWORD=change-me

  websockify:
    image: ghcr.io/yohann0617/oci-helper-websockify:master
    container_name: oci-helper-ws
    restart: unless-stopped
    ports:
      - "6080:6080"

volumes:
  oci-helper-data:
