name: Build frp-rs from source (test tag)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Git ref to build (branch/tag/commit, default: HEAD)'
        required: false
        default: 'HEAD'
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - frps
          - frpc

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.component }}-rs
          tags: |
            type=raw,value=test

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/frp-rs
          file: docker/frp-rs/Dockerfile.source
          platforms: linux/amd64,linux/arm64
          build-args: |
            FRP_COMPONENT=${{ matrix.component }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          provenance: false
