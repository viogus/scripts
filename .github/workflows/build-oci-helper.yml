name: Build & Push oci-helper Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/oci-helper/**'
      - '.github/workflows/build-oci-helper.yml'
  schedule:
    - cron: '37 3 * * 0'
  workflow_dispatch:
    inputs:
      oci_helper_version:
        description: 'oci-helper version tag (e.g. v3.5.0)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # --- main oci-helper app ---
  build-app:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.oci_helper_version }}" ]; then
            echo "oci_helper_version=${{ inputs.oci_helper_version }}" >> $GITHUB_OUTPUT
          else
            VER=$(curl -s https://api.github.com/repos/Yohann0617/oci-helper/releases/latest \
              | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$VER" ]; then
              echo "::warning::Failed to fetch latest oci-helper version, falling back to v3.5.0"
              VER="v3.5.0"
            fi
            echo "oci_helper_version=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/oci-helper
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.oci_helper_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/oci-helper
          platforms: linux/amd64,linux/arm64
          build-args: |
            OCI_HELPER_VERSION=${{ steps.version.outputs.oci_helper_version }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          provenance: false

  # --- websockify sidecar ---
  build-ws:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/oci-helper-ws
          tags: type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/oci-helper/websockify
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          provenance: false
