name: Build & Push Snell Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/snell/**'
      - '.github/workflows/build-snell.yml'
  schedule:
    - cron: '37 3 * * *'
  workflow_dispatch:
    inputs:
      snell_version:
        description: 'Snell version (e.g. 5.0.1)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        major:
          - 4
          - 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve v${{ matrix.major }} version
        id: version
        env:
          INPUT_VER: ${{ inputs.snell_version }}
        run: |
          MAJOR="${{ matrix.major }}"
          FORCE=false
          if [ -n "${INPUT_VER:-}" ]; then
            INPUT_MAJOR=$(echo "$INPUT_VER" | cut -d. -f1)
            if [ "$INPUT_MAJOR" != "$MAJOR" ]; then
              echo "Skip: input v${INPUT_VER} != matrix v${MAJOR}" >&2
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            VER="$INPUT_VER"
            FORCE=true
          else
            P="snell-server-v${MAJOR}\.[0-9]+\.[0-9]+[a-z0-9]*"
            VER=$(curl -s https://manual.nssurge.com/others/snell.html \
              | grep -oP "$P" \
              | grep -oP "${MAJOR}\.[0-9]+\.[0-9]+[a-z0-9]*" \
              | grep -v b | sort -Vr | head -1) || true
            if [ -z "$VER" ]; then
              echo "[snell] WARNING: scrape failed, using fallback ${MAJOR}.0.1" >&2
              VER="${MAJOR}.0.1"
            fi
          fi
          echo "snell_version=$VER" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "force=$FORCE" >> $GITHUB_OUTPUT

      - name: Check if version already built
        if: steps.version.outputs.skip != 'true'
        id: check
        run: |
          if [ "${{ steps.version.outputs.force }}" = "true" ]; then
            echo "Manual dispatch, forcing rebuild"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG="ghcr.io/${{ github.repository_owner }}/snell-server:v${{ steps.version.outputs.snell_version }}"
          if docker buildx imagetools inspect "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG not found, building"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate tags
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        id: tags
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/snell-server"
          V="${{ steps.version.outputs.snell_version }}"
          MAJOR="${{ steps.version.outputs.major }}"

          TAGS="${IMG}:v${V},${IMG}:v${MAJOR}"
          if [ "$MAJOR" = "5" ]; then
            TAGS="${TAGS},${IMG}:latest"
          fi
          # manual dispatch with explicit version → mark as stable
          if [ "${{ steps.version.outputs.force }}" = "true" ]; then
            TAGS="${TAGS},${IMG}:stable"
          fi
          echo "list=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/snell
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            SNELL_VERSION=${{ steps.version.outputs.snell_version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.snell_version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.tags.outputs.list }}
          push: true
          provenance: false
