name: Build & Push Snell Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/snell/**'
      - '.github/workflows/build-snell.yml'
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      snell_version:
        description: 'Snell version (e.g. 5.0.1)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Snell version
        id: version
        run: |
          if [ -n "${{ inputs.snell_version }}" ]; then
            echo "snell_version=${{ inputs.snell_version }}" >> $GITHUB_OUTPUT
          else
            VER=$(curl -s https://manual.nssurge.com/others/snell.html \
              | grep -oP 'snell-server-v\K[0-9]+\.[0-9]+\.[0-9]+[a-z0-9]*' \
              | grep -v b | sort -Vr | head -1) || true
            [ -z "$VER" ] && VER="5.0.1"
            echo "snell_version=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/snell-server
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.snell_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/snell
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            SNELL_VERSION=${{ steps.version.outputs.snell_version }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          provenance: false
