name: Update Speed DNS (China Unicom Best IP)

on:
  schedule:
    - cron: "13 */3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch best China Unicom IP
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          URL="https://raw.githubusercontent.com/gslege/CloudflareIP/main/Me.txt"
          echo "[speed-dns] fetching $URL"

          BEST_IP=$(curl -fsSL --connect-timeout 10 --max-time 30 "$URL" \
            | grep '联通' \
            | head -1 \
            | cut -d'#' -f1)

          if [ -z "$BEST_IP" ]; then
            echo "[speed-dns] ERROR: no China Unicom IP found"
            exit 1
          fi

          if ! echo "$BEST_IP" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "[speed-dns] ERROR: invalid IP: $BEST_IP"
            exit 1
          fi

          echo "target_ip=$BEST_IP" >> "$GITHUB_OUTPUT"
          echo "[speed-dns] best China Unicom IP: $BEST_IP"

      - name: Update Cloudflare DNS
        shell: bash
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE }}
          RECORD_NAME: ${{ secrets.CF_SPEED_DNS_NAME }}
          TARGET_IP: ${{ steps.pick.outputs.target_ip }}
        run: |
          set -euo pipefail

          if [ -z "${CF_TOKEN}" ]; then
            echo "[cf] ERROR: CLOUDFLARE_TOKEN secret is empty"
            exit 1
          fi

          AUTH="Authorization: Bearer ${CF_TOKEN}"
          BASE="https://api.cloudflare.com/client/v4"
          ZID="${ZONE_ID:?CLOUDFLARE_ZONE secret not set}"
          RNAME="${RECORD_NAME:?CF_SPEED_DNS_NAME secret not set}"

          # Find existing DNS record
          echo "[cf] looking up record: ${RNAME}"
          REC_ID=$(curl -fsSL -H "${AUTH}" -H "Content-Type: application/json" \
            "${BASE}/zones/${ZID}/dns_records?type=A&name=${RNAME}" \
            | jq -r '.result[0].id')

          if [ -z "${REC_ID}" ] || [ "${REC_ID}" = "null" ]; then
            # Create new record
            echo "[cf] record not found, creating..."
            RESP=$(curl -fsSL -X POST \
              -H "${AUTH}" -H "Content-Type: application/json" \
              "${BASE}/zones/${ZID}/dns_records" \
              -d "{\"type\":\"A\",\"name\":\"${RNAME}\",\"content\":\"${TARGET_IP}\",\"ttl\":1,\"proxied\":false}")
          else
            # Update existing record
            echo "[cf] updating record ${REC_ID}..."
            RESP=$(curl -fsSL -X PUT \
              -H "${AUTH}" -H "Content-Type: application/json" \
              "${BASE}/zones/${ZID}/dns_records/${REC_ID}" \
              -d "{\"type\":\"A\",\"name\":\"${RNAME}\",\"content\":\"${TARGET_IP}\",\"ttl\":1,\"proxied\":false}")
          fi

          SUCCESS=$(echo "$RESP" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            ERRORS=$(echo "$RESP" | jq -r '.errors[].message')
            echo "[cf] API error: $ERRORS"
            exit 1
          fi

          echo "[cf] DNS record updated: ${RNAME} -> ${TARGET_IP}"
