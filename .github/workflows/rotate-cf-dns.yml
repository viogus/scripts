name: Rotate Cloudflare DNS (Beijing Time)

on:
  schedule:
    - cron: "0 17 * * *"   # 北京时间 01:00 (UTC 17:00)
    - cron: "3 5 * * *"   # 北京时间 13:03 (UTC 05:03)
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure jq is installed
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq not found, installing..."
            sudo apt-get update
            sudo apt-get install -y jq
          else
            echo "jq already installed"
            jq --version
          fi

      - name: Pick target IP
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          IPS='${{ secrets.IPS }}'
          DOMAIN='${{ secrets.DOMAIN }}'

          if [ -z "$IPS" ]; then
            echo "Secret IPS is empty"
            exit 1
          fi

          if [ -z "$DOMAIN" ]; then
            echo "Secret DOMAIN is empty"
            exit 1
          fi

          IP1=$(echo "$IPS" | jq -r '.[0]')
          IP2=$(echo "$IPS" | jq -r '.[1]')

          if [ -z "$IP1" ] || [ "$IP1" = "null" ]; then
            echo "IPS[0] is invalid"
            exit 1
          fi

          if [ -z "$IP2" ] || [ "$IP2" = "null" ]; then
            echo "IPS[1] is invalid"
            exit 1
          fi

          UTC_HOUR=$(date -u +%H)
          TARGET_IP=""

          # 北京时间 01:03 ≈ UTC 17点触发
          # 北京时间 13:03 ≈ UTC 5点触发
          if [ "$UTC_HOUR" = "17" ]; then
            TARGET_IP="$IP1"
          elif [ "$UTC_HOUR" = "5" ]; then
            TARGET_IP="$IP2"
          else
            echo "Skip unexpected trigger hour: $UTC_HOUR UTC"
            exit 0
          fi

          echo "target_ip=$TARGET_IP" >> "$GITHUB_OUTPUT"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "Selected IP: $TARGET_IP"
          echo "Domain: $DOMAIN"
          echo "UTC: $(date -u)"
          echo "Beijing: $(TZ=Asia/Shanghai date)"

      - name: Update Cloudflare DNS
        if: steps.pick.outputs.target_ip != ''
        uses: rez0n/create-dns-record@v2.2
        with:
          type: "A"
          name: ${{ steps.pick.outputs.domain }}
          content: ${{ steps.pick.outputs.target_ip }}
          ttl: 1
          proxied: false
          token: ${{ secrets.CLOUDFLARE_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE }}
