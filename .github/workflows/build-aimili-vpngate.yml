name: Build & Push AimiliVPN Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/aimili-vpngate/**'
      - '.github/workflows/build-aimili-vpngate.yml'
  schedule:
    - cron: '23 4 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          IMG="${{ env.REGISTRY }}/${{ github.repository_owner }}/aimili-vpngate"
          echo "list=${IMG}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/aimili-vpngate
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=AimiliVPN proxy gateway — VPNGate + SOCKS5/HTTP
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
