name: Build & Push FRP Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'build-frp.sh'
      - '.github/workflows/build-frp.yml'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      frp_version:
        description: 'FRP version tag (e.g. 0.68.1)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - frps
          - frpc

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine FRP version
        id: version
        run: |
          if [ -n "${{ inputs.frp_version }}" ]; then
            echo "frp_version=${{ inputs.frp_version }}" >> $GITHUB_OUTPUT
          else
            VER=$(curl -s https://api.github.com/repos/fatedier/frp/releases/latest \
              | grep '"tag_name":' | sed -E 's/.*"v?([^"]+)".*/\1/')
            [ -z "$VER" ] && VER="0.68.1"
            echo "frp_version=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.component }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.frp_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            FRP_VERSION=${{ steps.version.outputs.frp_version }}
            FRP_COMPONENT=${{ matrix.component }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          provenance: false
