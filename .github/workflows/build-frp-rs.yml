name: Build & Push frp-rs Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/frp-rs/**'
      - '.github/workflows/build-frp-rs.yml'
  schedule:
    - cron: '17 4 * * 0'
  workflow_dispatch:
    inputs:
      frp_rs_version:
        description: 'frp-rs version tag (e.g. 0.1.0)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - frps
          - frpc

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine frp-rs version
        id: version
        run: |
          if [ -n "${{ inputs.frp_rs_version }}" ]; then
            echo "frp_rs_version=${{ inputs.frp_rs_version }}" >> $GITHUB_OUTPUT
            echo "force=true" >> $GITHUB_OUTPUT
          else
            VER=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/viogus/frp-rs/releases/latest \
              | jq -r '.tag_name | ltrimstr("v")')
            if [ -z "$VER" ] || [ "$VER" = "null" ]; then
              echo "WARN: failed to fetch latest frp-rs version, using fallback" >&2
              VER="0.1.0"
            fi
            echo "frp_rs_version=$VER" >> $GITHUB_OUTPUT
            echo "force=false" >> $GITHUB_OUTPUT
          fi

      - name: Check if version already built
        id: check
        run: |
          if [ "${{ steps.version.outputs.force }}" = "true" ]; then
            echo "Manual dispatch, forcing rebuild"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          IMG="${{ matrix.component }}-rs"
          TAG="ghcr.io/${{ github.repository_owner }}/${IMG}:${{ steps.version.outputs.frp_rs_version }}"
          if docker buildx imagetools inspect "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG not found, building"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        if: steps.check.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.component }}-rs
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.frp_rs_version }}

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/frp-rs
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            FRP_VERSION=${{ steps.version.outputs.frp_rs_version }}
            FRP_COMPONENT=${{ matrix.component }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          provenance: false
