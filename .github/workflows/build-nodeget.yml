name: Build & Push NodeGet Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/nodeget/**'
      - '.github/workflows/build-nodeget.yml'
  schedule:
    - cron: '7 7 * * *'
  workflow_dispatch:
    inputs:
      nodeget_version:
        description: 'NodeGet version tag (e.g. 0.2.11)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        component:
          - nodeget-server
          - nodeget-agent

    steps:
      - uses: actions/checkout@v4

      - name: Determine NodeGet version
        id: version
        run: |
          if [ -n "${{ inputs.nodeget_version }}" ]; then
            echo "nodeget_version=${{ inputs.nodeget_version }}" >> $GITHUB_OUTPUT
          else
            VER=$(curl -s https://api.github.com/repos/GenshinMinecraft/NodeGet/releases/latest \
              | grep '"tag_name":' | sed -E 's/.*"v?([^"]+)".*/\1/')
            if [ -z "$VER" ]; then
              echo "::warning::Failed to fetch latest NodeGet version, falling back to 0.2.11"
              VER="0.2.11"
            fi
            echo "nodeget_version=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Check if image already published
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # only skip on schedule; push/workflow_dispatch always build
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          VER="${{ steps.version.outputs.nodeget_version }}"
          COMP="${{ matrix.component }}"
          EXISTS=$(gh api "orgs/${{ github.repository_owner }}/packages/container/${COMP}/versions" \
            --jq '.[].metadata.container.tags[]' 2>/dev/null | grep -Fx "${VER}" || true)

          if [ -n "$EXISTS" ]; then
            echo "Tag ${COMP}:${VER} already published, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag ${COMP}:${VER} not found, building..."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.component }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.nodeget_version }}

      - name: Build and push
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/nodeget
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            NODEGET_VERSION=${{ steps.version.outputs.nodeget_version }}
            NODEGET_COMPONENT=${{ matrix.component }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          provenance: false
