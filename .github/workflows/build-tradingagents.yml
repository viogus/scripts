name: Build & Push TradingAgents Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/tradingagents/**'
      - '.github/workflows/build-tradingagents.yml'
  schedule:
    - cron: '47 2 * * *'
  workflow_dispatch:
    inputs:
      tradingagents_version:
        description: 'TradingAgents version tag (e.g. 0.2.7)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  UPSTREAM_REPO: simonlin1212/TradingAgents-astock

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.tradingagents_version }}" ]; then
            echo "version=${{ inputs.tradingagents_version }}" >> $GITHUB_OUTPUT
          else
            VER=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest \
              | jq -r '.tag_name | ltrimstr("v")')
            if [ -z "$VER" ] || [ "$VER" = "null" ]; then
              echo "::warning::Failed to fetch latest version, using fallback 0.2.7"
              VER="0.2.7"
            fi
            echo "version=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Clone upstream repo
        run: |
          # clone main branch (tag v0.2.7 has pyproject.toml bug: dependencies
          # misplaced under [project.urls]). version is for labeling only.
          git clone --depth 1 \
            "https://github.com/${{ env.UPSTREAM_REPO }}.git" /tmp/upstream
          cp docker/tradingagents/Dockerfile docker/tradingagents/.dockerignore /tmp/upstream/

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: /tmp/upstream
          file: /tmp/upstream/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tradingagents:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tradingagents:v${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
          push: true
          provenance: false
